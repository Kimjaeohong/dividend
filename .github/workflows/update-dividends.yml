name: Update US dividend data

on:
  schedule:
    # 매일 22:10 UTC = 한국시간 아침 07:10
    - cron: '10 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install yfinance

      - name: Fetch dividend data
        run: python scripts/fetch_dividends.py

      - name: Commit & push if changed
        run: |
          git config user.name "dividend-bot"
          git config user.email "actions@github.com"
          git add data/us_dividends.json
          git diff --cached --quiet || git commit -m "data: update $(date -u +%Y-%m-%d)"
          git push
